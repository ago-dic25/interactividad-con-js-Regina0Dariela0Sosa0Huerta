<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Spot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Cursive:wght@400..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
  <!--<script src="https://kit.fontawesome.com/6d11003e79.js" crossorigin="anonymous"></script>-->
</head>
<body>
<header>
  <img src="img/logo.png" alt="Logo de Blog Spot">
  <nav>

    <button id="menu">Menu</button>

    <ul>
      <li>
        <a href="#">Articles</a>
      </li>
      <li>
        <a href="#">Radio</a>
      </li>
      <li>
        <a href="#">Podcast</a>
      </li>
      <li>
        <a href="#">Crear Cuenta / Registro</a>
      </li>
    </ul>

    <button id="dark-mode-toggle" aria-label="Modo Oscuro / Claro">
      🌙 / ☀️
    </button>

    <button id="buscar">Buscar</button>
    <input type="text" id="buscarInput" placeholder="Escribe tu búsqueda">
  </nav>
</header>

<main>
  <section>
    <div class="tarjeta" id="bestOfTheWeek">
      <h1>Best of the week</h1>
      <a href="#">See all posts</a>
    </div>
    <div class="posts ocultar" id="posts">
      <div class="post">Experiencia como Podcaster</div>
      <div class="post">Como empezar</div>
      <div class="post">Como hacerte viral en Tik Tok</div>
      <div class="post">Como crear reels para redes sociales</div>
    </div>
    <div class="tarjeta" id="travel">
      <span>Sep 06, 2022</span>
      <button>Travel</button>
      <img src="img/arnel-hasanovic-MNd-Rka1o0Q-unsplash.jpg" width="50%" alt="">
      <div class="info">
        <span>Travel</span>
        <h2>TravelPro</h2>
      </div>
    </div>
  </section>
  <aside>
    <div class="tarjeta" id="ads">
      <span>ADS</span>
      <button id="likes">+</button>
      <span>Likes: <span id="likeCount">0</span></span>
      <span>Become a podcaster</span>
      <h3>Real talk</h3>
    </div>

    <div class="tarjeta" id="seeAll">
      <img id="seeAllImage" src="img/soundtrap-n30_i7mx62o-unsplash.jpg" alt="Imagen principal" width="50%">
      <button>See all pics</button>

      <div class="imagenes ocultar" id="fotos">
        <div class="imagen"><img src="img/flores.jpg" alt="Flores" width="50%"></div>
        <div class="imagen"><img src="img/alpes.jpg" alt="Alpes" width="50%"></div>
        <div class="imagen"><img src="img/arnel-hasanovic-MNd-Rka1o0Q-unsplash.jpg" alt="Arnel Hasanovic" width="50%"></div>
        <div class="imagen"><img src="img/travel.jpg" alt="Travel" width="50%"></div>
        <div class="imagen"><img src="img/tren.jpg" alt="Tren" width="50%"></div>
      </div>
    </div>

  </aside>
</main>
<script src="js/app.js"></script>
</body>
</html>
